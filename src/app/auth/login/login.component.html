<!-- login.component.html -->
<div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>{{ roleTitle }} Login</h1>
        <p>Sign in to access your dashboard</p>
      </div>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-alert error" *ngIf="errorMessage">
          <i class="material-icons">error_outline</i>
          <span>{{ errorMessage }}</span>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-container">
            <i class="material-icons">email</i>
            <input 
              type="email" 
              id="email" 
              formControlName="email"
              placeholder="Enter your email address"
            />
          </div>
          <div class="form-error" *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-container">
            <i class="material-icons">lock</i>
            <input 
              [type]="hidePassword ? 'password' : 'text'" 
              id="password" 
              formControlName="password"
              placeholder="Enter your password"
            />
            <button 
              type="button" 
              class="password-toggle" 
              (click)="hidePassword = !hidePassword"
            >
              <i class="material-icons">{{ hidePassword ? 'visibility_off' : 'visibility' }}</i>
            </button>
          </div>
          <div class="form-error" *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>
        
        <div class="form-group form-options">
          <div class="remember-me">
            <input type="checkbox" id="rememberMe" formControlName="rememberMe" />
            <label for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        
        <button 
          type="submit" 
          class="login-btn" 
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="loader"></span>
        </button>
      </form>
      
      <div class="login-footer">
        <button type="button" class="back-btn" (click)="goBack()">
          <i class="material-icons"><-</i> Back
        </button>
        
        <div class="register-option" *ngIf="role && role !== 'employee'">
          <span>Don't have an account?</span>
          <a [routerLink]="role === 'company' ? ['/auth/register-company'] : ['/auth/register-space-owner']">Register</a>
        </div>
      </div>
    </div>
  </div>
