<div class="container mt-4">
    <h2>Create New Workspace</h2>
  
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  
    <form (ngSubmit)="createWorkspace()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" [(ngModel)]="newWorkspace.name" name="name" required>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Type</label>
        <input type="text" class="form-control" [(ngModel)]="newWorkspace.type" name="type" required>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Capacity</label>
        <input type="number" class="form-control" [(ngModel)]="newWorkspace.capacity" name="capacity" required>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" class="form-control" [(ngModel)]="newWorkspace.location" name="location" required>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Price Per Seat Per Hour</label>
        <input type="number" class="form-control" [(ngModel)]="newWorkspace.pricePerSeatPerHour" name="pricePerSeatPerHour" required>
      </div>
  
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" [(ngModel)]="newWorkspace.available" name="available">
        <label class="form-check-label">Available</label>
      </div>
  
      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Creating...' : 'Create Workspace' }}
      </button>
    </form>
  
    <a [routerLink]="['/coworking-spaces']" class="btn btn-secondary mt-3">Back to Coworking Space</a>
  </div>
